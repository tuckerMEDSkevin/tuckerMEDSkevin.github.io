<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jamahiriya Music</title>

  <link rel="icon" type="image/svg+xml" href="images/Flag_of_Libya.svg">

  <meta property="og:title"       content="Jamahiriya Music — Song Library">
  <meta property="og:description" content="Funk, disco and pop recorded under Gaddafi's Jamahiriya — state-sponsored music from the 1970s–90s, produced in Malta and Italy to spread the message of the Green Book.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://tuckermedskevin.github.io/jamahiriya-music.html">
  <meta property="og:image"       content="https://tuckermedskevin.github.io/images/Gaddafi-music.png">
  <meta property="og:image:alt"   content="Jamahiriya Music">
  <meta property="og:site_name"   content="Jamahiriya Music">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Jamahiriya Music — Song Library">
  <meta name="twitter:description" content="Funk, disco and pop recorded under Gaddafi's Jamahiriya — state-sponsored music from the 1970s–90s, produced in Malta and Italy to spread the message of the Green Book.">
  <meta name="twitter:image"       content="https://tuckermedskevin.github.io/images/Gaddafi-music.png">
  <style>
    :root {
      --green-deep:  #004d26;
      --green-mid:   #006b34;
      --green-vivid: #009A44;
      --gold:        #c8a84b;
      --gold-dim:    #8a6f2e;
      --cream:       #f0ede6;
      --cream-dim:   #b8b49a;
      --bg:          #021a0d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--cream);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 20%, rgba(0,154,68,0.1) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 100%, rgba(0,77,38,0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent, transparent 14px,
        rgba(0,154,68,0.03) 14px, rgba(0,154,68,0.03) 15px
      );
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1rem 4rem;
    }

    @media (min-width: 520px) {
      .page { padding: 4rem 2rem 5rem; }
    }

    /* — header — */
    header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeUp .8s ease both;
    }

    .site-title {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(1.2rem, 6vw, 2.2rem);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .45rem;
      word-break: break-word;
    }

    .site-tagline {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(.7rem, 2.8vw, .82rem);
      font-weight: 400;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: .55rem;
    }

    .site-subtitle {
      font-size: .72rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-top: 1.4rem;
    }
    .header-rule-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim));
    }
    .header-rule-line.right {
      background: linear-gradient(to left, transparent, var(--gold-dim));
    }
    .header-rule-diamond {
      color: var(--gold);
      font-size: .75rem;
      line-height: 1;
      flex-shrink: 0;
    }

    /* — corner marks (letterhead frame) — */
    .corner-marks {
      position: fixed;
      inset: 1rem;
      pointer-events: none;
      z-index: 2;
    }
    .corner-marks span {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(200,168,75,0.35);
      border-style: solid;
    }
    .corner-marks span:nth-child(1) { top: 0; left: 0;  border-width: 1px 0 0 1px; }
    .corner-marks span:nth-child(2) { top: 0; right: 0; border-width: 1px 1px 0 0; }
    .corner-marks span:nth-child(3) { bottom: 0; left: 0;  border-width: 0 0 1px 1px; }
    .corner-marks span:nth-child(4) { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

    /* — album groups — */
    .album-group {
      margin-bottom: 0;
      animation: fadeUp .8s ease both;
    }

    /* — album heading with thumbnail — */
    .album-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .9rem;
      padding-bottom: .6rem;
      border-bottom: 1px solid rgba(0,154,68,0.3);
      border-left: 2px solid var(--gold-dim);
      padding-left: .7rem;
    }

    .album-thumb {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      object-fit: cover;
      border: 1px solid rgba(200,168,75,0.25);
      background: var(--green-deep);
      display: block;
    }

    .album-title {
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: clamp(.95rem, 3vw, 1.15rem);
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--green-vivid);
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    /* — crescent divider between album groups — */
    .album-divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin: 2rem 0;
    }
    .album-divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,154,68,0.3));
    }
    .album-divider-line.right {
      background: linear-gradient(to left, transparent, rgba(0,154,68,0.3));
    }
    .album-divider-crescent {
      color: var(--gold-dim);
      font-size: .7rem;
      flex-shrink: 0;
    }

    /* — song rows — */
    .song-row {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      padding: .6rem .3rem;
      border-bottom: 1px solid rgba(0,154,68,0.1);
      text-decoration: none;
      transition: background .15s;
      border-radius: 2px;
    }
    .song-row:last-child {
      border-bottom: none;
    }
    .song-row:hover {
      background: rgba(0,154,68,0.08);
    }

    @media (hover: none) {
      .song-arrow { opacity: 1 !important; }
      .song-row { padding-top: .75rem; padding-bottom: .75rem; }
    }

    .track-num {
      font-size: .7rem;
      color: var(--gold-dim);
      letter-spacing: .05em;
      width: 1.4rem;
      flex-shrink: 0;
      text-align: right;
    }

    .song-title {
      font-size: .95rem;
      color: var(--cream);
      flex: 1;
      transition: color .15s;
    }
    .song-row:hover .song-title {
      color: var(--gold);
    }

    .song-arrow {
      font-size: .7rem;
      color: var(--gold-dim);
      opacity: 0;
      transition: opacity .15s;
    }
    .song-row:hover .song-arrow {
      opacity: 1;
    }

    /* — loading / error states — */
    .status {
      text-align: center;
      color: var(--gold-dim);
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 3rem 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="corner-marks">
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="page">

    <header>
      <div class="site-title">Jamahiriya Music</div>
      <div class="site-tagline">Songs from Gaddafi-era Libya</div>
      <div class="site-subtitle">Song Library</div>
      <div class="header-rule">
        <div class="header-rule-line"></div>
        <div class="header-rule-diamond">&#9770;</div>
        <div class="header-rule-line right"></div>
      </div>
    </header>

    <main id="content">
      <div class="status" id="status">Loading…</div>
    </main>

  </div>

  <script>
    fetch('songs/songs.json')
      .then(r => r.json())
      .then(songs => {
        const content = document.getElementById('content');
        const status  = document.getElementById('status');

        if (!songs.length) {
          status.textContent = 'No songs yet.';
          return;
        }

        status.remove();

        // Group by album
        const albumMap = {};
        for (const song of songs) {
          if (!albumMap[song.album]) albumMap[song.album] = [];
          albumMap[song.album].push(song);
        }

        // Sort albums alphabetically
        const albums = Object.keys(albumMap).sort((a, b) => a.localeCompare(b));

        // Slug helper — mirrors the Python slugify
        function slugify(text) {
          return text.toLowerCase().trim()
            .replace(/[^\w\s-]/g, '')
            .replace(/[\s_]+/g, '-');
        }

        albums.forEach((album, i) => {
          const tracks = albumMap[album].sort((a, b) => a.track - b.track);

          // Crescent divider between albums (not before the first)
          if (i > 0) {
            const div = document.createElement('div');
            div.className = 'album-divider';
            div.innerHTML = `
              <div class="album-divider-line"></div>
              <span class="album-divider-crescent">&#9770;</span>
              <div class="album-divider-line right"></div>`;
            content.appendChild(div);
          }

          const group = document.createElement('div');
          group.className = 'album-group';
          group.id = slugify(album);
          group.style.animationDelay = `${i * 0.07}s`;

          // Album heading with thumbnail
          const albumHeader = document.createElement('div');
          albumHeader.className = 'album-header';

          // Cover thumbnail — cover path in json is ../albums/x.jpg relative to songs/
          // From bands/ it becomes albums/x.jpg
          const firstCover = tracks[0] && tracks[0].cover
            ? tracks[0].cover.replace(/^\.\.\//, '')
            : null;

          if (firstCover) {
            const thumb = document.createElement('img');
            thumb.className  = 'album-thumb';
            thumb.src        = firstCover;
            thumb.alt        = album;
            thumb.onerror    = () => { thumb.style.display = 'none'; };
            albumHeader.appendChild(thumb);
          }

          const heading = document.createElement('div');
          heading.className = 'album-title';
          heading.textContent = album;
          albumHeader.appendChild(heading);
          group.appendChild(albumHeader);

          for (const song of tracks) {
            const link = document.createElement('a');
            link.className = 'song-row';
            link.href = `songs/${song.file}`;

            const num = document.createElement('span');
            num.className = 'track-num';
            num.textContent = song.track;

            const title = document.createElement('span');
            title.className = 'song-title';
            title.textContent = song.title;

            const arrow = document.createElement('span');
            arrow.className = 'song-arrow';
            arrow.textContent = '→';

            link.appendChild(num);
            link.appendChild(title);
            link.appendChild(arrow);
            group.appendChild(link);
          }

          content.appendChild(group);
        });
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Could not load songs.json';
      });
  </script>
</body>
</html>
