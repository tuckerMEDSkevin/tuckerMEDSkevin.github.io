<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Song — Al-Hani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <style>
    :root {
      --green-deep:    #004d26;
      --green-mid:     #006b34;
      --green-vivid:   #009A44;
      --green-light:   #00c255;
      --gold:          #c8a84b;
      --gold-dim:      #8a6f2e;
      --cream:         #f0ede6;
      --cream-dim:     #b8b49a;
      --bg:            #021a0d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* subtle radial glow from centre */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 40%, rgba(0,154,68,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 90%, rgba(0,77,38,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* faint repeating diagonal lines texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 14px,
        rgba(0,154,68,0.03) 14px,
        rgba(0,154,68,0.03) 15px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(480px, 92vw);
      padding: 3rem 2.6rem 2.4rem;
      border: 1px solid rgba(0,154,68,0.35);
      border-top: 2px solid var(--gold);
      background: rgba(2, 30, 14, 0.82);
      backdrop-filter: blur(6px);
      animation: fadeUp .9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* — top ornament — */
    .ornament {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2rem;
      animation: fadeUp .9s .1s ease both;
    }
    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim));
    }
    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--gold-dim));
    }
    .ornament-diamond {
      width: 7px;
      height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* — cover art — */
    .cover-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      margin-bottom: 1.6rem;
      overflow: hidden;
      border: 1px solid rgba(0,154,68,0.3);
      background: var(--green-deep);
      position: relative;
      animation: fadeUp .9s .12s ease both;
    }
    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .5s ease;
    }
    .cover-wrap img.loaded { opacity: 1; }

    .cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green-mid);
      font-size: 3rem;
      opacity: .4;
    }

    /* — metadata — */
    .meta { animation: fadeUp .9s .18s ease both; }

    .label {
      font-family: 'Cinzel', serif;
      font-size: .62rem;
      letter-spacing: .22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: .25rem;
    }

    .song-title {
      font-family: 'Cinzel', serif;
      font-size: 1.85rem;
      font-weight: 600;
      color: var(--cream);
      line-height: 1.15;
      letter-spacing: .03em;
      margin-bottom: 1.4rem;
    }

    .detail-row {
      display: flex;
      gap: 2rem;
      margin-bottom: .4rem;
    }

    .detail-block { flex: 1; }

    .detail-value {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: .01em;
    }

    /* — divider — */
    .divider {
      margin: 1.8rem 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,154,68,0.5), transparent);
      animation: fadeUp .9s .25s ease both;
    }

    /* — player — */
    .player { animation: fadeUp .9s .32s ease both; }

    .timeline-wrapper {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.1rem;
    }

    .time-label {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      color: var(--gold-dim);
      letter-spacing: .08em;
      width: 2.6rem;
      flex-shrink: 0;
    }
    .time-label.right { text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;
      background: var(--green-mid);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      box-shadow: 0 0 6px rgba(200,168,75,0.5);
      transition: transform .15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    input[type="range"].volume-slider {
      width: 80px;
      flex: none;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--green-vivid);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s, box-shadow .2s;
      position: relative;
    }
    .btn-play:hover {
      background: rgba(0,154,68,0.18);
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(0,154,68,0.3);
    }
    .btn-play svg { fill: var(--cream); transition: fill .2s; }
    .btn-play:hover svg { fill: var(--gold); }

    .vol-row {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .vol-icon { color: var(--gold-dim); font-size: .85rem; }

    /* — footer — */
    .footer-ornament {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      animation: fadeUp .9s .4s ease both;
    }

    /* progress fill via JS inline style trick */
    #seekBar {
      background: linear-gradient(
        to right,
        var(--green-vivid) 0%,
        var(--green-vivid) var(--pct, 0%),
        var(--green-mid)   var(--pct, 0%),
        var(--green-mid)   100%
      );
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <div class="cover-wrap" id="coverWrap">
      <div class="cover-placeholder" id="coverPlaceholder">♪</div>
      <img id="coverArt" alt="Album cover" src="">
    </div>

    <div class="meta">
      <div class="label">Now Playing</div>
      <div class="song-title" id="songTitle">—</div>

      <div class="detail-row">
        <div class="detail-block">
          <div class="label">Artist</div>
          <div class="detail-value" id="artistName">—</div>
        </div>
        <div class="detail-block">
          <div class="label">Album</div>
          <div class="detail-value" id="albumName">—</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="player">
      <!-- Audio source points to ../audio/ folder -->
      <audio id="audio" preload="metadata">
        <source src="../audio/fragrance-of-my-land.mp3" type="audio/mpeg">
      </audio>

      <!-- Seek bar -->
      <div class="timeline-wrapper">
        <span class="time-label" id="currentTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
        <span class="time-label right" id="duration">0:00</span>
      </div>

      <!-- Controls -->
      <div class="controls-row">
        <!-- Play / Pause -->
        <button class="btn-play" id="playBtn" aria-label="Play">
          <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>

        <!-- Volume -->
        <div class="vol-row">
          <span class="vol-icon">♪</span>
          <input type="range" class="volume-slider" id="volBar" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
    </div>

    <div class="footer-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

  </div>

  <script>
    const audio    = document.getElementById('audio');
    const playBtn  = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const seekBar  = document.getElementById('seekBar');
    const volBar   = document.getElementById('volBar');
    const curEl    = document.getElementById('currentTime');
    const durEl    = document.getElementById('duration');

    const PLAY_PATH  = "M8 5v14l11-7z";
    const PAUSE_PATH = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

    const MP3_SRC = "../audio/al-hani.mp3";

    // — Read ID3 tags —
    jsmediatags.read(MP3_SRC, {
      onSuccess(tag) {
        const t = tag.tags;

        document.getElementById('songTitle').textContent  = t.title  || 'Unknown Title';
        document.getElementById('artistName').textContent = t.artist || 'Unknown Artist';
        document.getElementById('albumName').textContent  = t.album  || 'Unknown Album';
        document.title = (t.title || 'Song') + (t.artist ? ' — ' + t.artist : '');

        // Cover art (stored as APIC tag)
        const pic = t.picture;
        if (pic) {
          const bytes = new Uint8Array(pic.data);
          const blob  = new Blob([bytes], { type: pic.format });
          const url   = URL.createObjectURL(blob);
          const img   = document.getElementById('coverArt');
          img.src     = url;
          img.onload  = () => {
            img.classList.add('loaded');
            document.getElementById('coverPlaceholder').style.display = 'none';
          };
        }
      },
      onError(err) {
        console.warn('Could not read ID3 tags:', err.type, err.info);
        document.getElementById('songTitle').textContent  = 'Unknown Title';
        document.getElementById('artistName').textContent = 'Unknown Artist';
        document.getElementById('albumName').textContent  = 'Unknown Album';
      }
    });

    // — Player controls —
    function fmt(s) {
      const m   = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        playIcon.setAttribute('d', PAUSE_PATH);
      } else {
        audio.pause();
        playIcon.setAttribute('d', PLAY_PATH);
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      durEl.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      seekBar.value = pct;
      seekBar.style.setProperty('--pct', pct + '%');
      curEl.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      playIcon.setAttribute('d', PLAY_PATH);
      seekBar.value = 0;
      seekBar.style.setProperty('--pct', '0%');
      curEl.textContent = '0:00';
    });

    seekBar.addEventListener('input', () => {
      if (audio.duration) {
        audio.currentTime = (seekBar.value / 100) * audio.duration;
        seekBar.style.setProperty('--pct', seekBar.value + '%');
      }
    });

    volBar.addEventListener('input', () => {
      audio.volume = volBar.value;
    });
  </script>
</body>
</html>
