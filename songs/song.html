<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- ================================================
       OPEN GRAPH TAGS — fill these in per song page
       ================================================ -->
  <meta property="og:title"       content="SONG TITLE — ARTIST NAME">
  <meta property="og:description" content="Track N from ALBUM NAME">
  <meta property="og:type"        content="music.song">
  <meta property="og:url"         content="https://YOUR-USERNAME.github.io/songs/SONG-FILE.html">
  <meta property="og:image"       content="https://YOUR-USERNAME.github.io/albums/ALBUM-COVER.jpg">
  <meta property="og:image:alt"   content="ALBUM NAME album cover">
  <meta property="og:site_name"   content="YOUR SITE NAME">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="SONG TITLE — ARTIST NAME">
  <meta name="twitter:description" content="Track N from ALBUM NAME">
  <meta name="twitter:image"       content="https://YOUR-USERNAME.github.io/albums/ALBUM-COVER.jpg">
  <!-- ================================================ -->

  <title>Loading…</title>

  <style>
    :root {
      --green-deep:  #004d26;
      --green-mid:   #006b34;
      --green-vivid: #009A44;
      --gold:        #c8a84b;
      --gold-dim:    #8a6f2e;
      --cream:       #f0ede6;
      --cream-dim:   #b8b49a;
      --bg:          #021a0d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--cream);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 40%, rgba(0,154,68,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 90%, rgba(0,77,38,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent, transparent 14px,
        rgba(0,154,68,0.03) 14px, rgba(0,154,68,0.03) 15px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(480px, 92vw);
      padding: 3rem 2.6rem 2.4rem;
      border: 1px solid rgba(0,154,68,0.35);
      border-top: 2px solid var(--gold);
      background: rgba(2, 30, 14, 0.82);
      backdrop-filter: blur(6px);
      animation: fadeUp .9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2rem;
    }
    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim));
    }
    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--gold-dim));
    }
    .ornament-diamond {
      width: 7px; height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* cover art */
    .cover-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      margin-bottom: 1.6rem;
      overflow: hidden;
      border: 1px solid rgba(0,154,68,0.3);
      background: var(--green-deep);
      position: relative;
    }
    .cover-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .5s ease;
    }
    .cover-wrap img.loaded { opacity: 1; }
    .cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green-mid);
      font-size: 3rem;
      opacity: .4;
    }

    /* metadata */
    .label {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: .62rem;
      letter-spacing: .22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: .25rem;
    }

    .song-title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 1.85rem;
      font-weight: 600;
      color: var(--cream);
      line-height: 1.15;
      letter-spacing: .03em;
      margin-bottom: 1.4rem;
    }

    .detail-row {
      display: flex;
      gap: 1.5rem;
      margin-bottom: .4rem;
    }
    .detail-block { flex: 1; }
    .detail-block.track { flex: 0 0 auto; min-width: 3rem; }

    .detail-value {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: .01em;
    }

    /* divider */
    .divider {
      margin: 1.8rem 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,154,68,0.5), transparent);
    }

    /* timeline */
    .timeline-wrapper {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.1rem;
    }

    .time-label {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: .7rem;
      color: var(--gold-dim);
      letter-spacing: .08em;
      width: 2.6rem;
      flex-shrink: 0;
    }
    .time-label.right { text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;
      background: var(--green-mid);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      box-shadow: 0 0 6px rgba(200,168,75,0.5);
      transition: transform .15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    input[type="range"].volume-slider { width: 80px; flex: none; }

    /* controls row */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .playback-controls {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    /* skip buttons */
    .btn-skip {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(0,154,68,0.4);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s;
    }
    .btn-skip:hover {
      background: rgba(0,154,68,0.15);
      border-color: var(--gold-dim);
    }
    .btn-skip svg { fill: var(--cream-dim); transition: fill .2s; }
    .btn-skip:hover svg { fill: var(--gold); }

    /* play/pause */
    .btn-play {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--green-vivid);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s, box-shadow .2s;
    }
    .btn-play:hover {
      background: rgba(0,154,68,0.18);
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(0,154,68,0.3);
    }
    .btn-play svg { fill: var(--cream); transition: fill .2s; }
    .btn-play:hover svg { fill: var(--gold); }

    /* loop-one button */
    .btn-loop {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(0,154,68,0.4);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s;
      position: relative;
    }
    .btn-loop svg { fill: var(--cream-dim); transition: fill .2s; }
    .btn-loop:hover { background: rgba(0,154,68,0.15); border-color: var(--gold-dim); }
    .btn-loop:hover svg { fill: var(--gold); }

    /* active state — lit up in gold */
    .btn-loop.active {
      border-color: var(--gold);
      background: rgba(200,168,75,0.1);
    }
    .btn-loop.active svg { fill: var(--gold); }

    .right-controls {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .vol-row { display: flex; align-items: center; gap: .5rem; }
    .vol-icon { color: var(--gold-dim); font-size: .85rem; }

    .footer-ornament {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    #seekBar {
      background: linear-gradient(
        to right,
        var(--green-vivid) 0%,
        var(--green-vivid) var(--pct, 0%),
        var(--green-mid)   var(--pct, 0%),
        var(--green-mid)   100%
      );
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <div class="cover-wrap">
      <div class="cover-placeholder" id="coverPlaceholder">♪</div>
      <img id="coverArt" alt="Album cover">
    </div>

    <div class="label">Now Playing</div>
    <div class="song-title" id="songTitle">—</div>

    <div class="detail-row">
      <div class="detail-block">
        <div class="label">Artist</div>
        <div class="detail-value" id="metaArtist">—</div>
      </div>
      <div class="detail-block">
        <div class="label">Album</div>
        <div class="detail-value" id="metaAlbum">—</div>
      </div>
      <div class="detail-block track">
        <div class="label">Track</div>
        <div class="detail-value" id="metaTrack">—</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="player">
      <audio id="audio" preload="metadata"></audio>

      <div class="timeline-wrapper">
        <span class="time-label" id="currentTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
        <span class="time-label right" id="duration">0:00</span>
      </div>

      <div class="controls-row">

        <!-- Left: playback controls -->
        <div class="playback-controls">
          <button class="btn-skip" id="prevBtn" aria-label="Previous track">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
          </button>

          <button class="btn-play" id="playBtn" aria-label="Play">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <path id="playIcon" d="M8 5v14l11-7z"/>
            </svg>
          </button>

          <button class="btn-skip" id="nextBtn" aria-label="Next track">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
              <path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zM16 6h2v12h-2z"/>
            </svg>
          </button>
        </div>

        <!-- Right: loop + volume -->
        <div class="right-controls">

          <!-- Repeat-one button (loop icon with "1" inside) -->
          <button class="btn-loop" id="loopBtn" aria-label="Repeat one" title="Repeat one">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
              <!-- repeat arrows -->
              <path d="M7 7h10v2.5l3.5-3.5L17 2.5V5H7C5.35 5 4 6.35 4 8v3h2V8c0-.55.45-1 1-1z"/>
              <path d="M17 17H7v-2.5L3.5 18 7 21.5V19h10c1.65 0 3-1.35 3-3v-3h-2v3c0 .55-.45 1-1 1z"/>
              <!-- "1" numeral centred in the icon -->
              <text x="12" y="14.5"
                    text-anchor="middle"
                    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
                    font-size="6"
                    font-weight="bold"
                    fill="currentColor"
                    style="fill:inherit">1</text>
            </svg>
          </button>

          <div class="vol-row">
            <span class="vol-icon">♪</span>
            <input type="range" class="volume-slider" id="volBar" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

      </div>
    </div>

    <div class="footer-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

  </div>

  <script>
    const audio    = document.getElementById('audio');
    const playBtn  = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const seekBar  = document.getElementById('seekBar');
    const volBar   = document.getElementById('volBar');
    const curEl    = document.getElementById('currentTime');
    const durEl    = document.getElementById('duration');
    const prevBtn  = document.getElementById('prevBtn');
    const nextBtn  = document.getElementById('nextBtn');
    const loopBtn  = document.getElementById('loopBtn');

    const PLAY_PATH  = "M8 5v14l11-7z";
    const PAUSE_PATH = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

    let loopOne = false;

    loopBtn.addEventListener('click', () => {
      loopOne = !loopOne;
      loopBtn.classList.toggle('active', loopOne);
      loopBtn.setAttribute('aria-pressed', loopOne);
    });

    // Derive this page's filename from the URL
    // Normalise: ensure it ends in .html in case the URL omits the extension
    let thisFile = window.location.pathname.split('/').pop() || 'index.html';
    if (!thisFile.endsWith('.html')) thisFile = thisFile + '.html';

    let albumTracks = [];
    let thisSong    = null;

    function applyEntry(song) {
      document.title = `${song.title} — ${song.artist}`;
      document.getElementById('songTitle').textContent  = song.title;
      document.getElementById('metaArtist').textContent = song.artist;
      document.getElementById('metaAlbum').textContent  = song.album;
      document.getElementById('metaTrack').textContent  = song.track;

      audio.src = song.audio;
      audio.load();

      const img = document.getElementById('coverArt');
      if (song.cover) {
        img.src     = song.cover;
        img.onload  = () => {
          img.classList.add('loaded');
          document.getElementById('coverPlaceholder').style.display = 'none';
        };
        img.onerror = () => { img.style.display = 'none'; };
      } else {
        img.style.display = 'none';
      }
    }

    fetch('songs.json')
      .then(r => r.json())
      .then(songs => {
        thisSong = songs.find(s => s.file === thisFile);
        if (!thisSong) {
          document.getElementById('songTitle').textContent = 'Song not found in songs.json';
          return;
        }
        applyEntry(thisSong);
        albumTracks = songs
          .filter(s => s.album === thisSong.album)
          .sort((a, b) => a.track - b.track);
      })
      .catch(() => {
        document.getElementById('songTitle').textContent = 'Could not load songs.json';
      });

    function navigateTo(direction) {
      if (!thisSong || albumTracks.length === 0) return;

      if (albumTracks.length === 1) {
        audio.currentTime = 0;
        audio.play();
        playIcon.setAttribute('d', PAUSE_PATH);
        return;
      }

      const idx  = albumTracks.findIndex(s => s.file === thisFile);
      let   next = idx + direction;
      if (next >= albumTracks.length) next = 0;
      if (next < 0) next = albumTracks.length - 1;

      window.location.href = albumTracks[next].file;
    }

    prevBtn.addEventListener('click', () => navigateTo(-1));
    nextBtn.addEventListener('click', () => navigateTo(+1));

    function fmt(s) {
      const m   = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        playIcon.setAttribute('d', PAUSE_PATH);
      } else {
        audio.pause();
        playIcon.setAttribute('d', PLAY_PATH);
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      durEl.textContent = fmt(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      seekBar.value = pct;
      seekBar.style.setProperty('--pct', pct + '%');
      curEl.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      if (loopOne) {
        // Replay this song
        audio.currentTime = 0;
        audio.play();
        playIcon.setAttribute('d', PAUSE_PATH);
      } else {
        navigateTo(+1);
      }
    });

    seekBar.addEventListener('input', () => {
      if (audio.duration) {
        audio.currentTime = (seekBar.value / 100) * audio.duration;
        seekBar.style.setProperty('--pct', seekBar.value + '%');
      }
    });

    volBar.addEventListener('input', () => {
      audio.volume = volBar.value;
    });
  </script>
</body>
</html>
