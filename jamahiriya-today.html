<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta property="og:title"       content="Jamahiriya Song of the Day">
  <meta property="og:description" content="Fragrance Of My Land by Renato">
  <meta property="og:type"        content="music.song">
  <meta property="og:url"         content="https://tuckermedskevin.github.io/jamahiriya-today.html">
  <meta property="og:image"       content="https://tuckermedskevin.github.io/once-for-freedoms-sake.png">
  <meta property="og:image:alt"   content="Jamahiriya Song of the Day">
  <meta property="og:site_name"   content="Jamahiriya Music">

  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Jamahiriya Song of the Day">
  <meta name="twitter:description" content="Fragrance Of My Land by Renato">
  <meta name="twitter:image"       content="https://tuckermedskevin.github.io/once-for-freedoms-sake.png">

  <title>Jamahiriya Song of the Day</title>
  <link rel="icon" type="image/svg+xml" href="images/Flag_of_Libya.svg">

  <style>
    :root {
      --green-deep:  #004d26;
      --green-mid:   #006b34;
      --green-vivid: #009A44;
      --gold:        #c8a84b;
      --gold-dim:    #8a6f2e;
      --cream:       #f0ede6;
      --cream-dim:   #b8b49a;
      --bg:          #021a0d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--cream);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 40%, rgba(0,154,68,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 90%, rgba(0,77,38,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent, transparent 14px,
        rgba(0,154,68,0.03) 14px, rgba(0,154,68,0.03) 15px
      );
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(480px, 100%);
      margin: 0 1rem;
      padding: 2.4rem 1.6rem 2rem;
      border: 1px solid rgba(0,154,68,0.35);
      border-top: 2px solid var(--gold);
      background: rgba(2, 30, 14, 0.82);
      backdrop-filter: blur(6px);
      animation: fadeUp .9s ease both;
    }

    @media (min-width: 520px) {
      body { align-items: center; padding: 2rem 0; }
      .card { padding: 3rem 2.6rem 2.4rem; margin: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* — page title — */
    .page-title {
      font-size: clamp(1rem, 5vw, 1.5rem);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 1.8rem;
      line-height: 1.2;
    }

    /* — ornament — */
    .ornament {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 2rem;
    }
    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim));
    }
    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--gold-dim));
    }
    .ornament-diamond {
      color: var(--gold);
      font-size: .75rem;
      line-height: 1;
      flex-shrink: 0;
    }

    /* — cover art — */
    .cover-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      margin-bottom: 1.6rem;
      overflow: hidden;
      border: 1px solid rgba(0,154,68,0.3);
      background: var(--green-deep);
      position: relative;
    }
    .cover-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .5s ease;
    }
    .cover-wrap img.loaded { opacity: 1; }
    .cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--green-mid);
      font-size: 3rem;
      opacity: .4;
    }

    /* — metadata — */
    .label {
      font-size: .62rem;
      letter-spacing: .22em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: .25rem;
    }

    .song-title {
      font-size: clamp(1.2rem, 5.5vw, 1.85rem);
      font-weight: 600;
      color: var(--cream);
      line-height: 1.15;
      letter-spacing: .03em;
      margin-bottom: 1.4rem;
    }

    .detail-row {
      display: flex;
      gap: 1.5rem;
      margin-bottom: .4rem;
    }
    .detail-block { flex: 1; }
    .detail-block.track { flex: 0 0 auto; min-width: 3rem; }

    .detail-value {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--cream-dim);
      letter-spacing: .01em;
    }

    /* — divider — */
    .divider {
      margin: 1.8rem 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,154,68,0.5), transparent);
    }

    /* — timeline — */
    .timeline-wrapper {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.1rem;
    }

    .time-label {
      font-size: .7rem;
      color: var(--gold-dim);
      letter-spacing: .08em;
      width: 2.6rem;
      flex-shrink: 0;
    }
    .time-label.right { text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;
      background: var(--green-mid);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      box-shadow: 0 0 6px rgba(200,168,75,0.5);
      transition: transform .15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
    input[type="range"].volume-slider { width: 80px; flex: none; }

    @media (max-width: 519px) {
      input[type="range"] { height: 4px; }
      input[type="range"]::-webkit-slider-thumb { width: 20px; height: 20px; }
      input[type="range"].volume-slider { width: 70px; }
    }

    /* — controls row — */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* — play/pause button — */
    .btn-play {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--green-vivid);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s, box-shadow .2s;
    }
    .btn-play:hover {
      background: rgba(0,154,68,0.18);
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(0,154,68,0.3);
    }
    .btn-play svg { fill: var(--cream); transition: fill .2s; }
    .btn-play:hover svg { fill: var(--gold); }

    /* — loop button — */
    .btn-loop {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(0,154,68,0.4);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, border-color .2s;
    }
    .btn-loop svg { fill: var(--cream-dim); transition: fill .2s; }
    .btn-loop:hover { background: rgba(0,154,68,0.15); border-color: var(--gold-dim); }
    .btn-loop:hover svg { fill: var(--gold); }
    .btn-loop.active {
      border-color: var(--gold);
      background: rgba(200,168,75,0.1);
    }
    .btn-loop.active svg { fill: var(--gold); }

    .right-controls { display: flex; align-items: center; gap: .75rem; }
    .vol-row { display: flex; align-items: center; gap: .5rem; }
    .vol-icon { color: var(--gold-dim); font-size: .85rem; }

    /* — footer — */
    .footer-ornament {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    #seekBar {
      background: linear-gradient(
        to right,
        var(--green-vivid) 0%,
        var(--green-vivid) var(--pct, 0%),
        var(--green-mid)   var(--pct, 0%),
        var(--green-mid)   100%
      );
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="page-title">Jamahiriya Song of the Day</div>

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond">&#9770;</div>
      <div class="ornament-line right"></div>
    </div>

    <div class="cover-wrap">
      <div class="cover-placeholder" id="coverPlaceholder">♪</div>
      <!-- ✏️ Updated by update_sotd.py — do not edit manually -->
      <img id="coverArt" src="albums/once-for-freedoms-sake.png" alt="Album cover">
    </div>

    <div class="label">Now Playing</div>
    <!-- ✏️ Updated by update_sotd.py — do not edit manually -->
    <div class="song-title" id="songTitle">Fragrance Of My Land</div>

    <div class="detail-row">
      <div class="detail-block">
        <div class="label">Artist</div>
        <div class="detail-value" id="metaArtist">Renato</div>
      </div>
      <div class="detail-block">
        <div class="label">Album</div>
        <div class="detail-value" id="metaAlbum">Once For Freedom's Sake</div>
      </div>
      <div class="detail-block track">
        <div class="label">Track</div>
        <div class="detail-value" id="metaTrack">6</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="player">
      <!-- ✏️ Updated by update_sotd.py — do not edit manually -->
      <audio id="audio" preload="metadata">
        <source id="audioSource" src="audio/fragrance-of-my-land.mp3" type="audio/mpeg">
      </audio>

      <div class="timeline-wrapper">
        <span class="time-label" id="currentTime">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1">
        <span class="time-label right" id="duration">0:00</span>
      </div>

      <div class="controls-row">

        <button class="btn-play" id="playBtn" aria-label="Play">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <path id="playIcon" d="M8 5v14l11-7z"/>
          </svg>
        </button>

        <div class="right-controls">
          <button class="btn-loop" id="loopBtn" aria-label="Repeat one" title="Repeat one">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
              <path d="M7 7h10v2.5l3.5-3.5L17 2.5V5H7C5.35 5 4 6.35 4 8v3h2V8c0-.55.45-1 1-1z"/>
              <path d="M17 17H7v-2.5L3.5 18 7 21.5V19h10c1.65 0 3-1.35 3-3v-3h-2v3c0 .55-.45 1-1 1z"/>
              <text x="12" y="14.5"
                    text-anchor="middle"
                    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
                    font-size="6"
                    font-weight="bold"
                    fill="currentColor"
                    style="fill:inherit">1</text>
            </svg>
          </button>

          <div class="vol-row">
            <span class="vol-icon">♪</span>
            <input type="range" class="volume-slider" id="volBar" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

      </div>
    </div>

    <div class="footer-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond">&#9770;</div>
      <div class="ornament-line right"></div>
    </div>

  </div>

  <script>
    const audio    = document.getElementById('audio');
    const playBtn  = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const seekBar  = document.getElementById('seekBar');
    const volBar   = document.getElementById('volBar');
    const curEl    = document.getElementById('currentTime');
    const durEl    = document.getElementById('duration');
    const loopBtn  = document.getElementById('loopBtn');

    const PLAY_PATH  = "M8 5v14l11-7z";
    const PAUSE_PATH = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

    let loopOne = false;

    loopBtn.addEventListener('click', () => {
      loopOne = !loopOne;
      loopBtn.classList.toggle('active', loopOne);
      loopBtn.setAttribute('aria-pressed', loopOne);
    });

    // Cover art — check the attribute, not the property (empty src resolves to a full URL in JS)
    const coverImg = document.getElementById('coverArt');
    if (coverImg.getAttribute('src')) {
      coverImg.onload  = () => {
        coverImg.classList.add('loaded');
        document.getElementById('coverPlaceholder').style.display = 'none';
      };
      coverImg.onerror = () => { coverImg.style.display = 'none'; };
    } else {
      coverImg.style.display = 'none';
    }

    function fmt(s) {
      const m   = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        playIcon.setAttribute('d', PAUSE_PATH);
      } else {
        audio.pause();
        playIcon.setAttribute('d', PLAY_PATH);
      }
    });

    audio.addEventListener('loadedmetadata', () => {
      durEl.textContent = fmt(audio.duration);
      audio.play().then(() => {
        playIcon.setAttribute('d', PAUSE_PATH);
      }).catch(() => {
        // Autoplay blocked — user must press play manually
      });
    });

    audio.addEventListener('timeupdate', () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      seekBar.value = pct;
      seekBar.style.setProperty('--pct', pct + '%');
      curEl.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      if (loopOne) {
        audio.currentTime = 0;
        audio.play();
        playIcon.setAttribute('d', PAUSE_PATH);
      } else {
        // Stop — reset to beginning but don't play
        audio.currentTime = 0;
        playIcon.setAttribute('d', PLAY_PATH);
        seekBar.value = 0;
        seekBar.style.setProperty('--pct', '0%');
        curEl.textContent = '0:00';
      }
    });

    seekBar.addEventListener('input', () => {
      if (audio.duration) {
        audio.currentTime = (seekBar.value / 100) * audio.duration;
        seekBar.style.setProperty('--pct', seekBar.value + '%');
      }
    });

    volBar.addEventListener('input', () => {
      audio.volume = volBar.value;
    });
  </script>
</body>
</html>
